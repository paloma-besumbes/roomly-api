services:
  postgres:
    image: postgres:16
    container_name: roomly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roomly_db
    ports:
      - '5433:5432'
    volumes:
      - roomly_postgres_data:/var/lib/postgresql/data

volumes:
  roomly_postgres_data:
